<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Сильченко Владислав</title>
    <meta name="keywords" content="верстка, вариант 11, фикс">
    <style>
        body { background: #f0f0f0; margin: 0; display: flex; justify-content: center; }
        .wrapper { width: 1200px; display: grid; gap: 10px; grid-template-areas: 
            "header-left header-right header-right"
            "b1 b4 b5"
            "b2 b4 b6"
            "b3 b4 b6"
            "footer footer footer";
        }
        .header-left { grid-area: header-left; background: #3498db; height: 100px; }
        .header-right { grid-area: header-right; background: #2980b9; height: 100px; }
        footer { grid-area: footer; background: #34495e; height: 80px; color: white; }
        .b1 { grid-area: b1; background: #e74c3c; width: 300px; height: 150px; }
        .b2 { grid-area: b2; background: #e67e22; width: 300px; height: 150px; }
        .b3 { grid-area: b3; background: #f1c40f; width: 300px; height: 150px; }
        .b4 { grid-area: b4; background: #2ecc71; width: 600px; min-height: 470px; }
        .b5 { grid-area: b5; background: #9b59b6; width: 300px; height: 150px; }
        .b6 { grid-area: b6; background: #1abc9c; width: 300px; height: 310px; }
        .block { display: flex; align-items: center; justify-content: center; font-weight: bold; border: 1px solid #000; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="block header-left">Логотип</div>
        <div class="block header-right">Меню</div>
        
        <div class="block b1">1</div>
        <div class="block b2">2</div>
        <div class="block b3">3</div>
        <div class="block b4">4 (Основной контент)</div>
        <div class="block b5">5</div>
        <div class="block b6">6</div>
        <footer class="block">Подвал (Копирайт)</footer>
    </div>
</body>
</html>
