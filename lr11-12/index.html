<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: "Times New Roman", Times, serif;
            background-color: #f7f7f7;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 750px;
            margin: 0 auto;
            background-color: #ffffff;
            border: 1px solid #999;
            padding: 25px;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
        }
        h1 {
            font-size: 20px;
            text-align: center;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
            margin-top: 0;
        }
        .student-info {
            font-weight: bold;
            margin-bottom: 20px;
            border: 1px dashed #666;
            padding: 10px;
            background-color: #fffdf5;
        }
        .task-box {
            border: 1px solid #bbb;
            padding: 15px;
            margin-bottom: 20px;
            background-color: #fafafa;
        }
        .task-header {
            background-color: #e3e3e3;
            padding: 6px 12px;
            margin: -15px -15px 15px -15px;
            border-bottom: 1px solid #bbb;
            font-weight: bold;
        }
        .btn {
            background-color: #2c3e50;
            color: #fff;
            border: 1px solid #1a252f;
            padding: 6px 14px;
            cursor: pointer;
            font-size: 13px;
        }
        .btn:hover {
            background-color: #1a252f;
        }
        .result-panel {
            margin-top: 10px;
            padding: 10px;
            background-color: #fcfcfc;
            border-left: 3px solid #666;
            font-family: monospace;
            font-size: 13px;
        }
    </style>

    <!-- Задание №1: Скрипт размещается в Head -->
    <script>
        function showDate() {
            var currentDate = new Date();
            var month = currentDate.getMonth() + 1; // getMonth() идет с 0
            var year = currentDate.getFullYear();
            alert("Текущий месяц: " + month + "\nТекущий год: " + year);
        }
    </script>

    <!-- Задание №4: Подключение внешнего скрипта math.js -->
    <script src="math.js"></script>
</head>
<body>

<div class="container">
    

    

    <!-- Задание №1 -->
    <div class="task-box">
        <div class="task-header">Задание №1</div>
        <p>Вывести в диалоговое окно номер текущего месяца и года по клику:</p>
        <button class="btn" onclick="showDate()">Показать год</button>
    </div>

    <!-- Задание №2 -->
    <div class="task-box">
        <div class="task-header">Задание №2</div>
        <div class="result-panel">
            <script>
                // Скрипт находится внутри body и сам генерирует список
                document.write("<ol style='margin:0; padding-left:20px;'>");
                for (var i = 0; i < 10; i++) {
                    document.write("<li>Привет, мир</li>");
                }
                document.write("</ol>");
            </script>
        </div>
    </div>

    <!-- Задание №3 -->
    <div class="task-box">
        <div class="task-header">Задание №3</div>
        <div class="result-panel">
            <script>
                var arr = [12, -5, 8, 23, 4]; // Массив из 5 целых чисел
                var min = arr[0];
                var max = arr[0];
                for (var i = 1; i < arr.length; i++) {
                    if (arr[i] < min) min = arr[i];
                    if (arr[i] > max) max = arr[i];
                }
                document.write("<b>Сгенерированный массив:</b> [" + arr.join(", ") + "]<br>");
                document.write("<b>Минимальный элемент:</b> " + min + "<br>");
                document.write("<b>Максимальный элемент:</b> " + max);
            </script>
        </div>
    </div>

    <!-- Задание №4 -->
    <div class="task-box">
        <div class="task-header">Задание №4</div>
        <div class="result-panel">
            <script>
                var testX = 2; // Пример аргумента
                var res = calculateF(testX); // Вызов внешней функции
                document.write("<b>Входящий аргумент (x):</b> " + testX + "<br>");
                document.write("<b>Расчет f = (5x - √x + 10) / sin(x):</b> " + res);
            </script>
        </div>
    </div>

    <!-- Задание №5 -->
    <div class="task-box">
        <div class="task-header">Задание №5</div>
        <div class="result-panel">
            <script>
                var s1 = "Я родился в Гродно";
                var s2 = "Я – будущий программист.";
                
                // 1) Длина строки S2
                var lenS2 = s2.length;
                
                // 2) 5-ый символ S1 и его ASCII код
                // Человеческий 5-й символ - это символ с индексом 4, то есть буква "д"
                var charHuman = s1.charAt(4);
                var codeHuman = charHuman.charCodeAt(0);
                
                // 3) Замена букв «о» на «@» в S1
                var s1Replaced = s1.replace(/о/g, "@"); 
                
                document.write("<b>1. Длина S2:</b> " + lenS2 + " символов<br>");
                document.write("<b>2. 5-й символ в s1 (по порядку):</b> '" + charHuman + "' (ASCII код: " + codeHuman + ")<br>");
                document.write("<b>3. s1 с заменой букв 'о' на '@':</b> " + s1Replaced);
            </script>
        </div>
    </div>
</div>

</body>
</html>
